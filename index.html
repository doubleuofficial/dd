<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Official Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f5f5f7;
            --accent-main: #007bff; 
            --card-bg: rgba(20, 20, 20, 0.6); 
            --navbar-height: 70px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); 
            background: rgba(5,5,5,0.8);
        }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; height: var(--navbar-height); }
        .logo { text-decoration: none; color: #fff; font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 30px; }
        .nav-link { 
            text-decoration: none; color: rgba(255,255,255,0.6); font-size: 0.8rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { color: var(--accent-main); }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('assets/images/hero-bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .hero-content h1 { font-size: 5rem; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        .hero-content p { font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 30px; }
        .btn {
            display: inline-block; padding: 15px 40px; border: 1px solid #fff; color: #fff;
            text-decoration: none; text-transform: uppercase; font-size: 0.8rem; font-weight: bold;
            letter-spacing: 2px; transition: 0.4s;
        }
        .btn:hover { background: #fff; color: #000; }

        /* --- CONTACT SECTION --- */
        #contact { padding: 100px 0; background: #080808; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; }
        
        .contact-form {
            max-width: 600px; margin: 0 auto;
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .form-group { margin-bottom: 20px; }
        input, textarea {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--accent-main); }
        .submit-btn {
            width: 100%; padding: 15px; background: var(--accent-main);
            border: none; color: white; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; border-radius: 8px;
        }

        footer { padding: 60px 0; text-align: center; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">DOUBLE<span style="color: var(--accent-main);">U</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="music.html" class="nav-link">Music</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <p>Independent Melodic Trap</p>
            <h1>DOUBLEU</h1>
            <a href="music.html" class="btn">Explore Discography</a>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <div class="section-header">
                <h2>Get In Touch</h2>
                <p>For booking and licensing inquiries.</p>
            </div>
            <form class="contact-form">
                <div class="form-group"><input type="text" placeholder="Full Name"></div>
                <div class="form-group"><input type="email" placeholder="Email Address"></div>
                <div class="form-group"><textarea rows="5" placeholder="Your Message"></textarea></div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 DOUBLEU | OKLAHOMA CITY</p>
    </footer>
</body>
</html>
