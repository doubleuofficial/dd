<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoubleU | Official Artist Website</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="DoubleU - Official Artist Website. One-stop cinematic music creator for film, TV, and sync licensing.">

    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f5f5f7;
            --accent-main: #1a73e8; 
            --secondary-accent: #f2a900;
            --youtube-red: #ff0000;
            --card-bg: rgba(20, 20, 20, 0.7); 
            --navbar-height: 70px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 50% 50%, #111 0, #050505 100%);
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            scroll-behavior: smooth;
        }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }

        /* NAVBAR */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); 
            background: rgba(5,5,5,0.8);
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; height: var(--navbar-height); }
        .logo { text-decoration: none; color: #fff; font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 30px; }
        .nav-link { 
            text-decoration: none; color: rgba(255,255,255,0.6); font-size: 0.8rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { color: var(--accent-main); }

        /* HERO SECTION */
        .hero { padding: 160px 0 60px; text-align: center; }
        .artist-name {
            font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 900;
            text-transform: uppercase; letter-spacing: -5px;
            background: linear-gradient(to bottom, #ffffff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .subtitle { font-size: 1rem; opacity: 0.7; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px; display: block; }

        /* SECTIONS & CARDS */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            margin-bottom: 80px;
            overflow: hidden;
        }

        .label { color: var(--accent-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; display: block; }

        /* BUTTONS */
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 45px; 
            background: var(--accent-main); color: white; border-radius: 50px; font-weight: 700; transition: 0.3s; border: none; cursor: pointer;
            text-decoration: none;
        }
        .btn-youtube { background: var(--youtube-red); }

        /* VIDEO */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Anchor Scroll Offset */
        section { scroll-margin-top: 100px; }

        @media (max-width: 850px) {
            .hero { padding-top: 120px; }
            .nav-links { gap: 15px; }
            .nav-link { font-size: 0.7rem; }
        }
    </style>
</head>
